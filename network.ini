# Zone-level records: added once per zone at a fixed owner name.
# Format:  key=scope|owner|type|rdata
#   scope   ext  => external domains only
#           int  => internal domain only
#           all  => every zone (including reverse)
#   owner   @    => zone apex
#           else => prefix prepended to zone name (e.g. _dmarc, sel._domainkey)
#   $  in rdata expands to the zone name.
#
# Examples (uncomment and fill in real values):
[zone_records]
records=spf
records=spf_desktop
records=spf_dns_server
records=dmarc
records=dkim_dns_1
records=dkim_dns_1_khms1de
records=dkim_desktop_1
records=mx_zone
spf=ext|@|TXT|v=spf1 ip4:94.130.183.229 ip4:195.201.17.234 ip4:178.104.223.86 ip6:2a01:4f8:1c0c:43dd::1 ip6:2a01:4f8:1c0c:4a3b::1 ip6:2a01:4f8:c015:1e1d::1 ~all
spf_desktop=ext|desktop|TXT|v=spf1 ip4:94.130.183.229 ip6:2a01:4f8:1c0c:43dd::1 ~all
spf_dns_server=khms1.de|dns-server|TXT|v=spf1 ip4:94.130.183.229 ip6:2a01:4f8:1c0c:43dd::1 ~all
#dmarc=ext|_dmarc|TXT|v=DMARC1; p=quarantine; rua=mailto:kai.extern+rua@gmail.com; ruf=mailto:kai.extern+ruf@gmail.com;
dmarc=ext|_dmarc|TXT|v=DMARC1; p=quarantine;
dkim_dns_1=ext|dns_1._domainkey|TXT|v=DKIM1; k=rsa; 
dkim_dns_1_khms1de=khms1.de|dns_1._domainkey|TXT|v=DKIM1; k=rsa; 
dkim_desktop_1=ext|desktop_1._domainkey|TXT|v=DKIM1; k=rsa; 
mx_zone=all|@|MX|10 mail.$

